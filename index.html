<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      table {
        font-family: roboto;
      }

      table {
        border-collapse: collapse;
      }

      th {
        background-color: blueviolet;
        color: #fff;
        padding: 8px 3px;
      }

      tr:nth-child(odd) {
        background: #ccc;
      }

      td {
        padding: 6px 3px;
        border: 1px solid rgba(49, 49, 49, 0);
      }
      table {
        margin: auto;
        width: 40%;
        box-shadow: 10px 10px 20px
      }
      button{
        width: 60px;
        height:40px;
        background-color: black;
        border: 1px solid;
        color: #fff;
        border-radius: 20%;
        box-shadow: 10px 10px 20px;
      }
      #moon{
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <button><i class="fa-regular fa-moon "></i></button>
    <div class="flex  gap-7.5">
      <div class="my-auto">
        <i class="fa-regular fa-moon  text-[200px] text-white rounded-[50%]" id="moon">
          <p class="text-[30px] bg-black">DARK MODE</p>
        </i>
      </div>
      <table class="table">
      <thead>
        <tr>
          <th id="nameBtn">NAME <i class="fa-solid fa-sort"></i></i></th>
          <th>TICKER</th>
          <th>VALUE</th>
          <th id="changeBtn">CHANGE <i class="fa-solid fa-sort"></i></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="my-auto"id="sun">
      <i class="fa-regular fa-sun  text-[200px]" ></i>
      <p class="text-[30px] text-center border border-black">LIGHT MODE</p>
    </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
